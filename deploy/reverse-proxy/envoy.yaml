# atlantis behind Envoy — terminate client mTLS at the edge, forward the
# verified client certificate to the gRPC backend via XFCC.
#
# Pair with the server configured as:
#   ATL_TRUSTED_PROXY_CALLERS=atlantis-proxy
# and a proxy client certificate whose CN is `atlantis-proxy`.
# See docs/guides/run-behind-a-reverse-proxy.md for the full setup.
#
# A starting point — verify typed_config @type strings against your Envoy
# version's API (v3 shown).

static_resources:
  listeners:
  - name: atlantis_listener
    address:
      socket_address: { address: 0.0.0.0, port_value: 443 }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          codec_type: AUTO
          stat_prefix: atlantis
          # SANITIZE_SET drops any client-supplied XFCC and sets our own,
          # carrying the full client cert (cert: true).
          forward_client_cert_details: SANITIZE_SET
          set_current_client_cert_details:
            cert: true
          route_config:
            virtual_hosts:
            - name: atlantis
              domains: ["*"]
              routes:
              - match: { prefix: "/" }
                route: { cluster: atlantis_grpc }
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          # Mandatory client cert, verified against the atlantis CA.
          require_client_certificate: true
          common_tls_context:
            tls_certificates:
            - certificate_chain: { filename: /certs/edge.crt }
              private_key:       { filename: /certs/edge.key }
            validation_context:
              trusted_ca: { filename: /certs/ca.crt }

  clusters:
  - name: atlantis_grpc
    type: STRICT_DNS
    connect_timeout: 5s
    # gRPC needs an HTTP/2 upstream.
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: atlantis_grpc
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: atlantis, port_value: 9090 }
    # Re-originate mTLS to the backend as the trusted proxy.
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: atlantis                          # must match the server cert SAN/CN
        common_tls_context:
          tls_certificates:
          - certificate_chain: { filename: /certs/proxy.crt }   # CN=atlantis-proxy
            private_key:       { filename: /certs/proxy.key }
          validation_context:
            trusted_ca: { filename: /certs/ca.crt }
