# atlantis behind nginx — terminate client mTLS at the edge, forward the
# verified client certificate to the gRPC backend.
#
# Pair with the server configured as:
#   ATL_TRUSTED_PROXY_CALLERS=atlantis-proxy
# and a proxy client certificate whose CN is `atlantis-proxy`.
# See docs/guides/run-behind-a-reverse-proxy.md for the full setup.
#
# Requires nginx built with the http_v2, http_ssl, and gRPC modules
# (nginx >= 1.13.10). This is a starting point — verify directive
# availability and spelling against your nginx version.

worker_processes auto;
events {}

http {
    upstream atlantis_grpc {
        server atlantis:9090;
    }

    server {
        listen 443 ssl;
        http2 on;                 # nginx >= 1.25.1; older: `listen 443 ssl http2;`
        server_name atlantis.example.com;

        # Edge server certificate presented to clients (your public cert).
        ssl_certificate     /certs/edge.crt;
        ssl_certificate_key /certs/edge.key;
        ssl_protocols       TLSv1.3;

        # --- Client mTLS termination ---
        # Verify the client cert against the atlantis CA. `on` makes a valid
        # client cert mandatory; requests without one are rejected here.
        ssl_client_certificate /certs/ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       2;

        location / {
            # Forward the verified client cert as a URL-encoded PEM. Setting
            # the header here REPLACES any client-supplied copy (sanitization).
            grpc_set_header X-Forwarded-Client-Cert $ssl_client_escaped_cert;

            # Re-originate mTLS to the backend as the trusted proxy.
            grpc_pass grpcs://atlantis_grpc;
            grpc_ssl_certificate         /certs/proxy.crt;   # CN=atlantis-proxy
            grpc_ssl_certificate_key     /certs/proxy.key;
            grpc_ssl_trusted_certificate /certs/ca.crt;
            grpc_ssl_verify              on;
            grpc_ssl_name                atlantis;           # must match the server cert SAN/CN
            grpc_ssl_protocols           TLSv1.3;            # backend is TLS 1.3-only
        }
    }
}
