# Audit exemptions — direct-pool callsites that the audit gate skips.
#
# Each entry is one file path relative to a caller-repo root (the parent
# directory of internal/). Glob patterns are accepted; prefer exact-file
# entries so each cutover PR removes one line.
#
# Every entry should disappear once the caller has fully cut over to the
# atlantis typed gRPC client. The target is an empty list — at that point
# the audit goes red on any direct-pool callsite in the scanned repos.
# Leaving an exemption in place after its replacement lands means the gate
# is no longer protecting anything.
#
# A single entry matches the same relative path in every caller repo scanned
# by AUDIT_CALLER_ROOTS. Add one line per file being migrated; remove the
# line when the corresponding cutover PR lands.
#
# Example:
#
#   files:
#     - "internal/users/postgres_repository.go"    # migrating in PR #42
#     - "internal/platform/database/postgres.go"   # pool setup, removed last

files: []
