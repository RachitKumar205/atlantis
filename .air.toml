# air hot-reload config. See Makefile dev-build for the build pipeline.

root = "."
tmp_dir = ".air"

[build]
  cmd = "make dev-build"
  bin = "./bin/atlantis"
  include_ext = ["go", "atl", "proto"]
  include_dir = ["cmd", "internal", "testdata/schema"]
  exclude_dir = ["gen", "atlantis", "migrations", "tests", "docs", ".air", "bin", "tmp", "node_modules", "clients"]
  exclude_regex = ["_test\\.go$"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "3s"

[log]
  time = true

[misc]
  clean_on_exit = false
