# buf generate config. Remote plugins are version-pinned.
version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/rachitkumar205/atlantis/clients/go/pb
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.6
    out: clients/go/pb
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: clients/go/pb
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true
