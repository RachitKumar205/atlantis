<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- atlantis console favicon. Concentric-ring brand mark on a
       dark-canvas rounded tile so the icon reads at 16×16 even when the
       browser renders it against a light tab strip. Contrast values
       are bumped one step brighter vs. the in-app variant (ink-2 → ink-1
       for the middle ring) so the rings don't mush together at small
       sizes. -->
  <rect width="32" height="32" rx="6" fill="#0C0C0E"/>
  <circle cx="16" cy="16" r="12"  stroke="#8E8E97" stroke-width="1.5" fill="none"/>
  <circle cx="16" cy="16" r="6.5" stroke="#C5C5CC" stroke-width="1.2" fill="none"/>
  <circle cx="16" cy="16" r="2.4" fill="#D4A574"/>
</svg>
