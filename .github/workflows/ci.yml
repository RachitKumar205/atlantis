# atlantis CI.
#
# Gates every PR on: build, vet, lint, unit tests, codegen freshness,
# migration up/down/up safety, and integration tests against ephemeral
# Postgres + memcached. Integration suite needs Docker; we use GitHub
# Actions' built-in Docker runtime via testcontainers-go.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: unit tests with race detector
        run: go test -race ./...

      - name: codegen freshness
        # Catches "edited .pc but forgot to regenerate." If make codegen
        # produces different bytes than gen/, fail loudly so the PR author
        # knows to run codegen + commit before merging.
        run: make codegen-check

      - name: integration tests
        # testcontainers-go spins up Postgres + memcached against GitHub
        # Actions' Docker. Allow up to 10m for the first container pull;
        # subsequent runs hit the layer cache and finish in ~30s.
        run: go test -tags=integration -timeout=10m ./tests/integration/...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  migration-safety:
    name: migrate up/down/up
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb-ha:pg16-all
        env:
          POSTGRES_USER: atlantis
          POSTGRES_PASSWORD: atlantis
          POSTGRES_DB: atlantis
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_URL: postgres://atlantis:atlantis@localhost:5432/atlantis?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/latest/download/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate

      - name: migrate-roundtrip
        # up → down → up against a fresh Postgres so a broken .down.sql
        # can't slip through. Exercises every migration in migrations/.
        run: make migrate-roundtrip
