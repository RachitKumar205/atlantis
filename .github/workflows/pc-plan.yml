# Reusable workflow that lets a caller repo (backend, vendor-platform,
# etc.) validate its .pc changes against a running atlantis server.
# The plan RPC is read-only: it returns the impact report and the
# classification (additive / backfill / breaking) without mutating any
# state, so this workflow is safe to run on every PR — including against
# the production endpoint.
#
# Exit code (mirrors `tide apply`'s convention):
#   0  plan is additive — safe to merge.
#   1  plan needs a backfill SQL — flagged for review, not auto-blocked.
#   2  plan is cross-caller breaking — workflow fails; merge blocked.
#   3  parse / network / config error — workflow fails.
#
# Caller-side usage (copy into the caller repo's
# .github/workflows/pc-plan.yml):
#
#   name: tide plan
#   on:
#     pull_request:
#       paths:
#         - "internal/**/*.atl"
#         - "tide.yaml"
#   jobs:
#     plan:
#       uses: github.com/rachitkumar205/atlantis/.github/workflows/pc-plan.yml@main
#       with:
#         endpoint: atlantis.staging.runwayave.internal:9090
#       secrets:
#         tls-cert: ${{ secrets.TIDE_TLS_CERT }}
#         tls-key:  ${{ secrets.TIDE_TLS_KEY }}
#         tls-ca:   ${{ secrets.TIDE_TLS_CA }}
#
# A successful run posts the plan report as a PR comment (table format).
# A breaking-change run fails the workflow before that comment lands —
# the breaking detail surfaces in the workflow logs so reviewers can
# triage from the Actions tab.

name: tide plan

on:
  workflow_call:
    inputs:
      endpoint:
        description: "atlantis server endpoint (host:port)"
        type: string
        required: true
      pc-cli-version:
        description: "version of the pc CLI to pin"
        type: string
        required: false
        default: latest
    secrets:
      tls-cert:
        description: "PEM-encoded client certificate"
        required: false
      tls-key:
        description: "PEM-encoded private key for the client cert"
        required: false
      tls-ca:
        description: "PEM-encoded CA bundle for the server"
        required: false

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pc CLI
        run: |
          go install github.com/rachitkumar205/atlantis/cmd/pc@${{ inputs.pc-cli-version }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Stage TLS material
        if: ${{ secrets.tls-cert != '' }}
        env:
          TIDE_TLS_CERT_PEM: ${{ secrets.tls-cert }}
          TIDE_TLS_KEY_PEM:  ${{ secrets.tls-key }}
          TIDE_TLS_CA_PEM:   ${{ secrets.tls-ca }}
        run: |
          umask 077
          mkdir -p "$RUNNER_TEMP/pc-tls"
          printf '%s\n' "$TIDE_TLS_CERT_PEM" > "$RUNNER_TEMP/pc-tls/client.crt"
          printf '%s\n' "$TIDE_TLS_KEY_PEM"  > "$RUNNER_TEMP/pc-tls/client.key"
          printf '%s\n' "$TIDE_TLS_CA_PEM"   > "$RUNNER_TEMP/pc-tls/ca.crt"
          {
            echo "TIDE_TLS_CERT=$RUNNER_TEMP/pc-tls/client.crt"
            echo "TIDE_TLS_KEY=$RUNNER_TEMP/pc-tls/client.key"
            echo "TIDE_TLS_CA=$RUNNER_TEMP/pc-tls/ca.crt"
          } >> "$GITHUB_ENV"

      - name: Run tide plan
        id: plan
        env:
          PC_ENDPOINT: ${{ inputs.endpoint }}
        run: |
          set -o pipefail
          tide plan --format=json --against="${{ inputs.endpoint }}" \
            | tee "$RUNNER_TEMP/plan.json"
